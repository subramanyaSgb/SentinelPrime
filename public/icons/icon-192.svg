  <path d="M24,24 L24,44 M24,24 L44,24" fill="none" stroke="#00FF41" stroke-width="2" opacity="0.4"/>
  <path d="M168,24 L168,44 M168,24 L148,24" fill="none" stroke="#00FF41" stroke-width="2" opacity="0.4"/>
  <path d="M24,168 L24,148 M24,168 L44,168" fill="none" stroke="#00FF41" stroke-width="2" opacity="0.4"/>
  <path d="M168,168 L168,148 M168,168 L148,168" fill="none" stroke="#00FF41" stroke-width="2" opacity="0.4"/>
