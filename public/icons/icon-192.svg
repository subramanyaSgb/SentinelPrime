  <circle cx="96" cy="96" r="48" fill="none" stroke="#00FF41" stroke-width="1.5" opacity="0.35"/>
  <!-- Inner ring -->
  <circle cx="96" cy="96" r="24" fill="none" stroke="#00FF41" stroke-width="1.5" opacity="0.5"/>
  <!-- Center dot -->
  <circle cx="96" cy="96" r="6" fill="#00FF41"/>
  <!-- Crosshair lines -->
  <line x1="96" y1="16" x2="96" y2="44" stroke="#00FF41" stroke-width="2" opacity="0.5"/>
  <line x1="96" y1="148" x2="96" y2="176" stroke="#00FF41" stroke-width="2" opacity="0.5"/>
  <line x1="16" y1="96" x2="44" y2="96" stroke="#00FF41" stroke-width="2" opacity="0.5"/>
  <line x1="148" y1="96" x2="176" y2="96" stroke="#00FF41" stroke-width="2" opacity="0.5"/>
